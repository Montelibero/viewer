<section class="section">
    <div class="container">
        <div class="mb-4">
            <a class="button is-small is-light" href="/" data-i18n="back-home">На главную</a>
        </div>

        <div class="box">
            <p class="title is-5" data-i18n="contract-title">Contract</p>
            <p class="subtitle is-7 is-mono" id="contract-id">—</p>
            <div class="buttons mt-4">
                <a class="button is-small is-link is-light"
                   id="btn-stellar-lab"
                   target="_blank"
                   rel="noreferrer"
                   data-i18n="link-stellar-lab">
                    Stellar Lab
                </a>
                <a class="button is-small is-link is-light"
                   id="btn-stellar-expert"
                   rel="noreferrer"
                   data-i18n="link-stellar-expert">
                    Stellar Expert
                </a>
            </div>
        </div>


        <article class="message is-danger is-hidden" id="error-box">
            <div class="message-header"><p data-i18n="error-title">Error</p></div>
            <div class="message-body" id="error-text"></div>
        </article>

        <div class="box" id="contract-details">
            <p data-i18n="status-loading">Loading...</p>
        </div>

        <div class="bottom-actions mt-4">
            <div class="columns is-mobile">
                <div class="column">
                    <a class="button is-link is-light is-fullwidth"
                       id="btn-operations"
                       data-i18n="link-operations">
                        События
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
